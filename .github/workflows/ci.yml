name: CI

# Runs on every push to main and on every pull request, so a change that breaks
# an existing feature is caught before it is merged rather than after it ships.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Offline tests only. They exercise the pure logic in backend/logic and
      # need no database or network, so a failure here is always a real
      # regression.
      - name: Run unit tests
        run: npm run test:unit

  backend-api-tests:
    name: Backend API tests (non-blocking)
    runs-on: ubuntu-latest
    # These call the deployed Render backend, which sleeps when idle and can
    # take a while to wake. They are useful signal but too flaky to gate a
    # merge on, so a failure is reported without failing the build.
    continue-on-error: true
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Wake the deployed backend
        run: curl -s -m 120 --retry 3 --retry-delay 15 https://laundrypulse-gf1v.onrender.com/ || true

      - name: Run API tests
        run: npx jest tests --testPathIgnorePatterns tests/unit

  frontend-analyze:
    name: Frontend analyze
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Infos are not fatal: the project carries a number of pre-existing ones
      # that are unrelated to any given change. Errors and warnings still fail
      # the job.
      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Check formatting of Dart sources
        run: dart format --output=none --set-exit-if-changed lib || echo "::warning::Dart sources are not formatted. Run 'dart format lib'."

  frontend-build:
    name: Frontend build (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.0'
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      # Catches the class of breakage that analyze alone misses, such as an
      # import of a file that does not exist.
      - name: Build web
        run: flutter build web --release
